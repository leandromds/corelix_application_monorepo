version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secretaria-digital-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secretaria_digital_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secretaria_digital_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - secretaria-digital-network

volumes:
  postgres_data:
    driver: local

networks:
  secretaria-digital-network:
    driver: bridge
