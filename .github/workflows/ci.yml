name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  test:
    name: Tests + Type Check + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secretaria_digital_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: apps/api/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('apps/api/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Set up test_rls_user role
        env:
          PGPASSWORD: postgres
        run: |
          # Cria o role test_rls_user sem BYPASSRLS para testes de isolamento RLS (ADR-021).
          #
          # NOTA sobre RLS policies no banco de teste:
          # As tabelas são criadas via Base.metadata.create_all() no conftest.py (não via
          # Alembic), portanto as RLS policies da migration NÃO são aplicadas automaticamente.
          # O conftest.py deve aplicar as policies programaticamente após create_all(), ex:
          #
          #   await conn.execute(text("""
          #     ALTER TABLE clients ENABLE ROW LEVEL SECURITY;
          #     CREATE POLICY tenant_isolation ON clients
          #       USING (professional_id = current_setting('app.current_tenant', TRUE)::uuid);
          #   """))
          #
          # Sem isso, os testes de isolamento (test_rls_user) passam trivialmente porque
          # não há policy para bloquear. Ver ADR-021 para o setup completo.
          #
          # GRANT ALL ON ALL TABLES é omitido intencionalmente: as tabelas ainda não
          # existem neste ponto (são criadas pelo conftest). O ALTER DEFAULT PRIVILEGES
          # abaixo cobre todas as tabelas criadas posteriormente na sessão.
          psql -h localhost -U postgres -d secretaria_digital_test -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'test_rls_user') THEN
                CREATE ROLE test_rls_user NOLOGIN;
              END IF;
            END
            \$\$;
            GRANT USAGE ON SCHEMA public TO test_rls_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT ALL ON TABLES TO test_rls_user;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT ALL ON SEQUENCES TO test_rls_user;
          "

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secretaria_digital_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secretaria_digital_test
          SECRET_KEY: ci-secret-key-not-for-production-64-chars-minimum-padding-here
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 30
          ENVIRONMENT: development
          CORS_ORIGINS: http://localhost:5173
          AI_API_KEY: sk-ci-placeholder-not-real
          AI_BASE_URL: https://api.openai.com/v1
          AI_MODEL: gpt-4o-mini
          WHATSAPP_VERIFY_TOKEN: ci-verify-token-placeholder
          WHATSAPP_APP_SECRET: ci-app-secret-placeholder-not-real
          WHATSAPP_APP_ID: ci-app-id-placeholder-not-real
          ENCRYPTION_KEY: ci-encryption-key-placeholder-32chars==
        run: poetry run pytest tests/ -v --tb=short --no-cov

      - name: Type check (mypy)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secretaria_digital_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secretaria_digital_test
          SECRET_KEY: ci-secret-key-not-for-production-64-chars-minimum-padding-here
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 30
          ENVIRONMENT: development
          CORS_ORIGINS: http://localhost:5173
          AI_API_KEY: sk-ci-placeholder-not-real
          AI_BASE_URL: https://api.openai.com/v1
          AI_MODEL: gpt-4o-mini
          WHATSAPP_VERIFY_TOKEN: ci-verify-token-placeholder
          WHATSAPP_APP_SECRET: ci-app-secret-placeholder-not-real
          WHATSAPP_APP_ID: ci-app-id-placeholder-not-real
          ENCRYPTION_KEY: ci-encryption-key-placeholder-32chars==
        run: poetry run mypy .

      - name: Lint (ruff)
        run: poetry run ruff check .
