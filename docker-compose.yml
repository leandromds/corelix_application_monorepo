# Production docker-compose — read by Coolify on git push.
# PostgreSQL is managed separately by Coolify (not defined here).
# All variables must be set in the Coolify environment panel.
version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_APP_ID: ${WHATSAPP_APP_ID}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_APP_ID: ${WHATSAPP_APP_ID}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
